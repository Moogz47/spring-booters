services:
  mysql:
    image: mysql:8.0
    container_name: fitness-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: fitnessdb
      MYSQL_USER: fitnessuser
      MYSQL_PASSWORD: fitnesspass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fitness-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: qa
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: fitnessdb
      MYSQL_USER: fitnessuser
      MYSQL_PASSWORD: fitnesspass
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
