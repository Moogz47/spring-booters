<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product - Fitness Warehouse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-lightning-charge-fill brand-icon"></i>Fitness Warehouse
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto ms-4">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}"><i class="bi bi-box-seam me-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}"><i class="bi bi-info-circle me-1"></i>About</a></li>
            </ul>
            <div class="nav-auth d-flex gap-2">
                <a class="btn btn-nav-login" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                <a class="btn btn-nav-register" th:href="@{/register}">Get Started</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4 fade-up" style="max-width: 640px;">
    <div class="glass-card">
        <div class="mb-4">
            <a th:href="@{/products}" class="btn btn-secondary btn-sm mb-3">
                <i class="bi bi-arrow-left me-1"></i>Back to Products
            </a>
            <h1 class="page-title"><i class="bi bi-plus-circle me-2" style="font-size:1.3rem"></i>Add Product</h1>
            <div class="accent-line"></div>
        </div>

        <form th:action="@{/products}" th:object="${product}" method="post">
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Dumbbell Set">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Brand</label>
                    <select th:field="*{brand}" class="form-select">
                        <option value="">Select a brand</option>
                        <option th:each="b : ${brands}" th:value="${b}" th:text="${b}"></option>
                    </select>
                    <div class="text-danger" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select th:field="*{category}" class="form-select">
                        <option value="">Select a category</option>
                        <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                    </select>
                    <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Price ($)</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control" placeholder="0.00">
                    <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" th:field="*{quantity}" class="form-control" placeholder="0">
                    <div class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Save Product
                </button>
                <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="site-footer">
    <div class="container">
        <p><span class="footer-brand">Fitness Warehouse</span> &mdash; Built by Spring Booters</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
