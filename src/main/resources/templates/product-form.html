<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Fitness Warehouse</a>

        <div>
            <a class="btn btn-outline-light me-2" th:href="@{/}">Home</a>
            <a class="btn btn-outline-light me-2" th:href="@{/products}">Products</a>
            <a class="btn btn-outline-light" th:href="@{/about}">About</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

<h1>Add Product</h1>

<form th:action="@{/products}" th:object="${product}" method="post">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" th:field="*{name}" class="form-control">
<div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
</div>

<div class="mb-3">
    <label class="form-label">Brand</label>
    <select th:field="*{brand}" class="form-select">
        <option value="">Select a brand</option>
        <option th:each="b : ${brands}" th:value="${b}" th:text="${b}"></option>
    </select>
    <div class="text-danger" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
</div>

<div class="mb-3">
    <label class="form-label">Category</label>
    <select th:field="*{category}" class="form-select">
        <option value="">Select a category</option>
        <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
    </select>
    <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
</div>

<div class="mb-3">
<label class="form-label">Price</label>
<input type="number" step="0.01" th:field="*{price}" class="form-control">
<div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
</div>

<div class="mb-3">
<label class="form-label">Quantity</label>
<input type="number" th:field="*{quantity}" class="form-control">
<div class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
</div>

<button type="submit" class="btn btn-success">Save Product</button>

</form>

</div>

</body>
</html>
