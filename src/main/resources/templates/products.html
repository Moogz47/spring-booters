<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Products - Fitness Warehouse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-lightning-charge-fill brand-icon"></i>Fitness Warehouse
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto ms-4">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}"><i class="bi bi-box-seam me-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}"><i class="bi bi-info-circle me-1"></i>About</a></li>
            </ul>
            <div class="nav-auth d-flex gap-2">
                <a class="btn btn-nav-login" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                <a class="btn btn-nav-register" th:href="@{/register}">Get Started</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4 fade-up">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="page-title"><i class="bi bi-box-seam me-2" style="font-size:1.5rem"></i>Products</h1>
            <div class="accent-line"></div>
        </div>
        <a class="btn btn-primary" th:href="@{/products/new}">
            <i class="bi bi-plus-lg me-1"></i>Add Product
        </a>
    </div>

    <div class="filter-bar fade-up fade-up-delay-1">
        <form method="get" th:action="@{/products}" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label"><i class="bi bi-tag me-1"></i>Brand</label>
                <input type="text" name="brand" class="form-control"
                       placeholder="Filter by brand..." th:value="${brand}">
            </div>
            <div class="col-md-3">
                <label class="form-label"><i class="bi bi-bookmark me-1"></i>Category</label>
                <input type="text" name="category" class="form-control"
                       placeholder="Filter by category..." th:value="${category}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Sort By</label>
                <select name="sortField" class="form-select">
                    <option value="name" th:selected="${sortField == 'name'}">Name</option>
                    <option value="price" th:selected="${sortField == 'price'}">Price</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Order</label>
                <select name="sortDir" class="form-select">
                    <option value="asc" th:selected="${sortDir == 'asc'}">Ascending</option>
                    <option value="desc" th:selected="${sortDir == 'desc'}">Descending</option>
                </select>
            </div>
            <div class="col-md-2 d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1">
                    <i class="bi bi-funnel me-1"></i>Filter
                </button>
                <a th:href="@{/products}" class="btn btn-secondary">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
        </form>
    </div>

    <div class="table-wrapper fade-up fade-up-delay-2">
        <table class="table">
            <thead>
            <tr>
                <th>Product</th>
                <th>Brand</th>
                <th>Category</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Added</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td><span class="product-name" th:text="${product.name}"></span></td>
                <td><span class="badge-brand" th:text="${product.brand}"></span></td>
                <td><span class="badge-category" th:text="${product.category}"></span></td>
                <td><span class="price-tag">$<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></span></span></td>
                <td>
                    <span class="quantity-badge"
                          th:classappend="${product.quantity == 0} ? 'qty-out' : (${product.quantity le 5} ? 'qty-low' : 'qty-good')"
                          th:text="${product.quantity}"></span>
                </td>
                <td style="color: var(--text-muted); font-size: 0.85rem;" th:text="${product.createdAt}"></td>
                <td class="text-end">
                    <a th:href="@{'/products/edit/' + ${product.id}}" class="btn btn-warning btn-sm me-1">
                        <i class="bi bi-pencil"></i> Edit
                    </a>
                    <a th:href="@{'/products/delete/' + ${product.id}}" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash3"></i> Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="site-footer">
    <div class="container">
        <p><span class="footer-brand">Fitness Warehouse</span> &mdash; Built by Spring Booters</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
    </table>
</div>

</body>
</html>
