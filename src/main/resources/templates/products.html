<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Fitness Warehouse</a>

        <div>
            <a class="btn btn-outline-light me-2" th:href="@{/}">Home</a>
            <a class="btn btn-outline-light me-2" th:href="@{/products}">Products</a>
            <a class="btn btn-outline-light" th:href="@{/about}">About</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="content-panel">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Products</h1>
                <div class="accent-line"></div>
            </div>

            <a class="btn btn-primary" th:href="@{/products/new}">
                Add Product
            </a>
        </div>

<form method="get" th:action="@{/products}" class="row g-3 mb-4">
    <div class="col-md-3">
        <input type="text" name="brand" class="form-control"
               placeholder="Filter by brand" th:value="${brand}">
    </div>

    <div class="col-md-3">
        <input type="text" name="category" class="form-control"
               placeholder="Filter by category" th:value="${category}">
    </div>

    <div class="col-md-2">
        <select name="sortField" class="form-select">
            <option value="name" th:selected="${sortField == 'name'}">Sort by Name</option>
            <option value="price" th:selected="${sortField == 'price'}">Sort by Price</option>
        </select>
    </div>

    <div class="col-md-2">
        <select name="sortDir" class="form-select">
            <option value="asc" th:selected="${sortDir == 'asc'}">Ascending</option>
            <option value="desc" th:selected="${sortDir == 'desc'}">Descending</option>
        </select>
    </div>

    <div class="col-md-2">
        <button type="submit" class="btn btn-success">Apply</button>
        <a th:href="@{/products}" class="btn btn-secondary">Clear</a>
    </div>
</form>

    <table class="table table-bordered table-striped mt-4">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Created At</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.brand}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.quantity}"></td>
            <td th:text="${product.createdAt}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
