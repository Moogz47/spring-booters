<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Fitness Warehouse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-lightning-charge-fill brand-icon"></i>Fitness Warehouse
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto ms-4">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Home</a></li>
            </ul>
            <div class="nav-auth d-flex gap-2">
                <a class="btn btn-nav-login" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                <a class="btn btn-nav-register active" th:href="@{/register}">Get Started</a>
            </div>
        </div>
    </div>
</nav>

<div class="auth-wrapper fade-up">
    <div class="auth-card">
        <div class="auth-icon">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h1>Create Account</h1>
        <p class="auth-subtitle">Join Fitness Warehouse to get started</p>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="background: var(--dark-surface); border: 1px solid var(--dark-border); border-right: none; color: var(--text-muted);">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a username" style="border-left: none;">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background: var(--dark-surface); border: 1px solid var(--dark-border); border-right: none; color: var(--text-muted);">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Create a password" style="border-left: none;">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Role</label>
                <select th:field="*{role}" class="form-select">
                    <option value="CUSTOMER">Customer</option>
                    <option value="STAFF">Staff</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-person-plus me-1"></i>Create Account
            </button>
        </form>

        <p class="text-center mt-3" style="color: var(--text-muted); font-size: 0.88rem;">
            Already have an account? <a th:href="@{/login}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
